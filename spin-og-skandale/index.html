<script>
/* =========================================================
   LYDEFFEKTER — Web Audio API, ingen eksterne filer
   ========================================================= */
const SFX = (function(){
  let ctx;
  function getCtx(){
    if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if(ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function correct(){
    /* Kort, snappy kamera-klik */
    const c = getCtx();
    const t = c.currentTime;
    /* Klik: kort hvid støj burst */
    const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.035), c.sampleRate);
    const data = buf.getChannelData(0);
    for(let i = 0; i < data.length; i++){
      const env = 1 - (i / data.length);
      data[i] = (Math.random() * 2 - 1) * env * env;
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    /* Båndpas for at gøre det mere mekanisk */
    const bp = c.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 3200; bp.Q.value = 1.8;
    const gain = c.createGain();
    gain.gain.setValueAtTime(0.35, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    src.connect(bp); bp.connect(gain); gain.connect(c.destination);
    src.start(t); src.stop(t + 0.06);

    /* Lille "pling" ovenpå */
    const osc = c.createOscillator();
    osc.type = 'sine'; osc.frequency.value = 1400;
    const g2 = c.createGain();
    g2.gain.setValueAtTime(0.12, t + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(g2); g2.connect(c.destination);
    osc.start(t + 0.02); osc.stop(t + 0.12);
  }

  function wrong(){
    /* Dump bonk-lyd */
    const c = getCtx();
    const t = c.currentTime;
    const osc = c.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.18);
    const g = c.createGain();
    g.gain.setValueAtTime(0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.connect(g); g.connect(c.destination);
    osc.start(t); osc.stop(t + 0.22);

    /* Kort støj-lag for tekstur */
    const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.05), c.sampleRate);
    const data = buf.getChannelData(0);
    for(let i = 0; i < data.length; i++){
      data[i] = (Math.random() * 2 - 1) * (1 - i/data.length) * 0.6;
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    const lp = c.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 600;
    const g2 = c.createGain();
    g2.gain.setValueAtTime(0.18, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    src.connect(lp); lp.connect(g2); g2.connect(c.destination);
    src.start(t); src.stop(t + 0.08);
  }

  function rekord(){
    /* Cha-ching: stigende tretonet fanfare */
    const c = getCtx();
    const t = c.currentTime;
    const notes = [523, 659, 784]; /* C5, E5, G5 */
    notes.forEach(function(freq, i){
      const osc = c.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const g = c.createGain();
      const start = t + i * 0.1;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.22, start + 0.02);
      g.gain.setValueAtTime(0.22, start + 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.35);
      osc.connect(g); g.connect(c.destination);
      osc.start(start); osc.stop(start + 0.35);
    });
    /* Lille shimmer ovenpå */
    const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.08), c.sampleRate);
    const data = buf.getChannelData(0);
    for(let i = 0; i < data.length; i++){
      data[i] = (Math.random() * 2 - 1) * (1 - i/data.length);
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    const hp = c.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 6000;
    const g2 = c.createGain();
    g2.gain.setValueAtTime(0.08, t + 0.05);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    src.connect(hp); hp.connect(g2); g2.connect(c.destination);
    src.start(t + 0.05); src.stop(t + 0.3);
  }

  return { correct:correct, wrong:wrong, rekord:rekord };
})();

/* Skærm-ryst */
function screenShake(){
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const el = document.getElementById('stage');
  el.classList.remove('shake');
  void el.offsetWidth; /* force reflow */
  el.classList.add('shake');
  el.addEventListener('animationend', function(){ el.classList.remove('shake'); }, {once:true});
}

/* ---------------------------------------------------------

--------------------------------------------------------- */
const LEVELS = [
  { sag:"01", titel:"Watergate", based:"USA \u00b7 Richard Nixon \u00b7 1972-74",
    situation:"Folk med forbindelse til pr\u00e6sidentens kampagne tages i et indbrud i oppositionens hovedkvarter. Sporene peger opad, og der findes lydb\u00e5nd fra Det Ovale V\u00e6relse.",

let state = { i:0, history:[], rigtige:0, slots:{}, started:false };

segsEl.innerHTML = LEVELS.map((_,i)=>`<span class="seg" id="seg-${i}"></span>`).join('');

function renderRecord(){
  LEVELS.forEach((_,i)=>{
    const seg = document.getElementById('seg-'+i);
    seg.className = 'seg' + (state.history[i]===true?' r':state.history[i]===false?' w':'');
    seg.textContent = state.history[i]===true ? '\u2713' : state.history[i]===false ? '\u2717' : '';
    if(i===state.i && state.history[i]===undefined) seg.classList.add('cur');
  });
  recLbl.innerHTML = `<b>${state.rigtige}</b> rigtige`;
}

function startGame(){
  state = { i:0, history:[], rigtige:0, slots:{}, started:true, deck:shuffle([...Array(LEVELS.length).keys()]) };
  recordEl.style.display = 'flex';
  renderRecord();
  showCase();
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function parseBased(b){ const p=b.split('\u00b7').map(s=>s.trim()); return {land:p[0]||'', person:p[1]||'', aar:p[p.length-1]||''}; }

function showCase(){
  const lv = LEVELS[state.deck[state.i]];
  const b = parseBased(lv.based);
  const nr = String(state.i+1).padStart(2,'0');
  const ord = shuffle([0,1,2]);
  state.slots = ord;
  caseCount.textContent = 'SAG ' + (state.i+1) + ' / 10';
  renderRecord();

  const buttons = ord.map((optIdx,slot)=>{
    const o = lv.svar[optIdx];
    return `<button class="choice" data-slot="${slot}"><span class="key">${SLOTS[slot]}</span><span>${o.t}</span></button>`;
  }).join('');

  app.innerHTML = `
    <div class="panel fade">
      <div class="card">
        <div class="stamp">Aktiv sag</div>
        <div class="portrait"><img src="${FOTO[lv.sag]}" alt="${lv.titel}"></div>
        <div class="meta">Sag nr. ${nr}</div>
        <div class="country">${b.land}</div>
        <h2 class="case-title">${lv.titel}</h2>
        <div class="cardsub">${b.person} \u00b7 ${b.aar}</div>
        <p class="situation">${lv.situation}</p>
        <div class="prompt">Sp\u00f8rgsm\u00e5l</div>
        <p class="question">${lv.spm}</p>
        <div class="choices">${buttons}</div>
      </div>
    </div>`;
  app.querySelectorAll('.choice').forEach(b=>{ b.onclick = ()=> choose(parseInt(b.dataset.slot,10)); });
}

function choose(slot){
  const lv = LEVELS[state.deck[state.i]];
  const b = parseBased(lv.based);
  const nr = String(state.i+1).padStart(2,'0');
  const picked = lv.svar[ state.slots[slot] ];
  const good = !!picked.ok;
  const correct = lv.svar.find(o=>o.ok);
  const q = CITATER[lv.sag];

  state.history[state.i] = good;
  if(good) state.rigtige++;
  renderRecord();

  /* === Lydeffekter og skærm-ryst === */
  try {
    if(good){ SFX.correct(); }
    else { SFX.wrong(); screenShake(); }
  } catch(e){}

  app.innerHTML = `
    <div class="panel fade">
      <div class="card">
        <div class="stamp land" style="${good?'color:var(--green);border-color:var(--green)':''}">${good ? 'Rigtigt' : 'Forkert'}</div>
        <div class="portrait"><img src="${FOTO[lv.sag]}" alt="${lv.titel}"></div>
        <div class="meta">Sag nr. ${nr} \u00b7 dit svar</div>
        <div class="country">${b.land}</div>
        <h2 class="case-title">${lv.titel}</h2>
        <div class="verdict ${good?'good':'bad'}"><span class="dot"></span>${good ? 'Rigtigt svar' : 'Forkert svar'}</div>
        ${good ? '' : `<div class="vsub">Du svarede: ${picked.t}</div>`}
        <div class="answer"><span class="alab">Det rigtige svar</span>${correct.t}</div>
        <div class="truth"><span class="lab">S\u00e5dan gik det i virkeligheden \u00b7 ${b.aar}</span>${lv.forklaring}</div>
        <div class="qbox"><div class="qlab">Til eftertanke</div><div class="qt">${q.t}</div><div class="qk">${q.k}</div></div>
        <div class="actions" id="act"></div>
      </div>
    </div>`;

  const act = document.getElementById('act');
  if(state.i === LEVELS.length - 1){
    act.innerHTML = `<button class="btn go big" id="next">Se dit jobtilbud \u25b8</button>`;
    document.getElementById('next').onclick = ending;
  } else {
    act.innerHTML = `<button class="btn big" id="next">N\u00e6ste sag \u25b8</button>`;
    document.getElementById('next').onclick = ()=>{ state.i++; showCase(); };
  }
}

function ending(){
  const r = state.rigtige;
  const recIdx = (r >= 5) ? (10 - r) : 6;
  const rec = LEGENDS[recIdx];
  const grid = state.history.map(h => h ? '\ud83d\udfe9' : '\ud83d\udfe5').join('');
  let rekord = 0;
  try { rekord = parseInt(localStorage.getItem('spin_rekord')||'0',10) || 0; } catch(e){}
  const nyRekord = r > rekord;
  if(nyRekord){ rekord = r; try { localStorage.setItem('spin_rekord', String(r)); } catch(e){} }

  /* === Cha-ching ved ny rekord === */
  if(nyRekord){ try { SFX.rekord(); } catch(e){} }

  const farve  = (r >= 5) ? "var(--green)" : "var(--red)";
  const border = (r >= 5) ? "var(--green-dk)" : "var(--red-dk)";

  let txt;
  if(r >= 5){
    const S = rec.pron==='hun' ? 'Hun' : 'Han';
    const s = rec.pron==='hun' ? 'hun' : 'han';
    txt = `Din telefon ringer. Det er <b>${rec.navn}</b>, ${rec.flavor}. ${S} har fulgt din h\u00e5ndtering af alle ti sager og er imponeret: ${r} ud af 10 reddet. Nu vil ${s} have dig p\u00e5 en opgave. En virksomhed skal have den gr\u00f8nlandske regering til at \u00e5bne et ellers fredet omr\u00e5de, s\u00e5 der kan suges olie op, og de mangler pr\u00e6cis din slags t\u00e6ft. L\u00f8nnen er astronomisk. Samvittigheden er valgfri.`;
  } else {
    txt = `Din telefon ringer, men det er ikke en af de helt store legender. Det er <b>Martin Rossen</b>. Du imponerede ikke ligaen denne gang: ${r} ud af 10 rakte ikke til de internationale stjerner. Til geng\u00e6ld kan Rossen bruge dig, han skal have kulkraft tilbage p\u00e5 sporet i EU, og det kr\u00e6ver en, der ikke stiller for mange sp\u00f8rgsm\u00e5l. Velkommen i maskinrummet. Diskret, som altid.`;
  }

  const banner = '<div class="art-banner">' + (r >= 5 ? OIL_ART : COAL_ART) + '</div>';
  const leagueRows = LEGENDS.map((L,i)=>`
    <div class="leg${i===recIdx?' me':''}">
      <div class="rk">${i+1}</div>
      <div>
        <div class="nm">${L.navn}${i===recIdx?'<span class="you">Ringede til dig</span>':''}</div>
        <div class="ds">${L.desc}</div>
      </div>
    </div>`).join('');

  caseCount.textContent = 'AUDITION SLUT';
  app.innerHTML = `
    <div class="screen fade" style="border-color:${border}">
      <div class="kicker" style="color:${farve}">Ligaen har set dig</div>
      <div class="bigscore" style="color:${farve}">${r} / 10</div>
      <div class="scoreline">sager reddet</div>
      <div class="sharegrid">${grid}</div>
      <div class="rekord" style="color:${nyRekord ? 'var(--gold)' : 'var(--muted-paper)'}">${nyRekord ? 'Ny rekord! ' : ''}Din bedste hidtil: ${rekord} / 10</div>
      <h2 class="rank-badge" style="color:${farve};margin-top:18px">${rec.navn} ringer</h2>
      <p class="lede">${txt}</p>
      ${banner}
      <div class="league">
        <h3>Spindoktor-ligaen</h3>
        <div class="lsub">Jo flere sager du redder, jo h\u00f8jere i ligaen r\u00e6kker du. Her er de andre, du kunne have imponeret, eller skuffet.</div>
        ${leagueRows}
      </div>
      <div class="actions" style="justify-content:flex-start;margin-top:22px;flex-wrap:wrap;gap:10px"><button class="btn go big" id="again">${r >= 5 ? 'Tag en ny runde' : 'Se om du kan f\u00e5 det gode tilbud'} \u25b8</button><button class="btn big" id="share">Del resultat \u25b8</button></div>
    </div>`;
  document.getElementById('again').onclick = startGame;
  const shareBtn = document.getElementById('share');
  shareBtn.onclick = ()=>{
    const text = 'Spin & Skandale: Krisemanageren\n' + r + '/10, rekrutteret af ' + rec.navn + '\n' + grid + '\nKan du sl\u00e5 mig?';
    if(navigator.share){
      navigator.share({title:'Spin & Skandale', text:text, url:location.href}).catch(()=>{});
    } else if(navigator.clipboard){
      navigator.clipboard.writeText(text + '\n' + location.href).then(()=>{
        shareBtn.textContent = 'Kopieret \u2713';
        setTimeout(()=>{ shareBtn.textContent = 'Del resultat \u25b8'; }, 2000);
      }).catch(()=>{});
    }
  };
}

document.addEventListener('keydown', e=>{
  if(!state.started) return;
  const idx = SLOTS.indexOf(e.key.toUpperCase());
  if(idx >= 0){
    const btn = app.querySelector('.choice[data-slot="'+idx+'"]');
    if(btn) btn.click();
  }
});
